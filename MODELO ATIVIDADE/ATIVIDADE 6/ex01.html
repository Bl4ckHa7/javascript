<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de exercicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div>
            <button onclick="reset()">Reset</button>
            <p>Número (entre 1 e 100):</p> <input type="text"> <button onclick="adicionarNumero()">Adicionar</button>
            <div class="box">
                <ul id="lista">
                </ul>
            </div>

            <button onclick="finalizar()">Finalizar</button>
        </div>
        <div id="resultado" style="display: none;">
            <p>Ao todo , temos <span id="contador">0</span> números adicionados.</p>
            <p>O maior valor informado é: <span id="maior">0</span></p>
            <p>O menor valor informado é: <span id="menor">0</span></p>
            <p>Somando todos os valores, temos: <span id="soma">0</span></p>
            <p>A média dos valores digitados é: <span id="media">0</span></p>
        </div>
    </section>
    <footer>
        <p>&copy; Desenvolvido por: Black</p>
    </footer>
    <script>
        let numeros = [];

        function adicionarNumero() {
            const input = document.querySelector('input[type="text"]');
            const numero = parseInt(input.value);
            const lista = document.getElementById('lista');

            if (isNaN(numero) || numero < 1 || numero > 100) {
                alert('Por favor, insira um número válido entre 1 e 100.');
                return;
            }

            if (numeros.includes(numero)) {
                alert('Número já adicionado.');
                return;
            }

            numeros.push(numero);
            const item = document.createElement('li');
            item.textContent = 'valor ' + numero + ' adicionado.';
            lista.appendChild(item);
            input.value = '';
        }

        function finalizar() {
            if (numeros.length === 0) {
                alert('Adicione pelo menos um número antes de finalizar.');
                return;
            }

            const contador = document.getElementById('contador');
            const maior = document.getElementById('maior');
            const menor = document.getElementById('menor');
            const soma = document.getElementById('soma');
            const media = document.getElementById('media');

            contador.textContent = numeros.length;
            maior.textContent = Math.max(...numeros);
            menor.textContent = Math.min(...numeros);
            soma.textContent = numeros.reduce((acc, curr) => acc + curr, 0);
            media.textContent = (numeros.reduce((acc, curr) => acc + curr, 0) / numeros.length).toFixed(2);

            document.getElementById('resultado').style.display = 'block';
        }

        function reset() {
            numeros = [];
            document.getElementById('lista').innerHTML = '';
            document.querySelector('input[type="text"]').value = '';
            document.getElementById('resultado').style.display = 'none';
        }

    </script>
</body>
</html>
